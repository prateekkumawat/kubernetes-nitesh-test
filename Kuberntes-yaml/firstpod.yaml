apiVersion: v1
kind: Pod
metadata:
  name: webapp
  labels:
    app.kubernetes.io/name: webapp
spec:
  containers:
  - name: webapp
    image: prateekkumawat/niteshclass:webapp1
    resources:
      requests:
        memory: "200Mi"
        cpu: "150m"
      limits:
        memory: "400Mi"
        cpu: "300m"
    ports:
      - containerPort: 80
