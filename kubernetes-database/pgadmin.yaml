apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgadmin
  namespace: postgres
  labels: 
    app: pgclient
spec:
  selector:
    matchLabels:
      app: pgclient
  template:
    metadata:
      labels:
        app: pgclient
    spec:
      containers:
      - name: pgadmin
        image: dpage/pgadmin4:latest
        resources: 
          requests:
            cpu: "100m" 
            memory: "100Mi"   
          limits:
            cpu: "150m" 
            memory: "200Mi"  
        ports:
        - containerPort: 80
        env: 
        - name: PGADMIN_DEFAULT_EMAIL
          value: admin@prateek.com
        - name: PGADMIN_DEFAULT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: pgadmin-secret
              key: password        

---
apiVersion: v1
kind: Service
metadata:
  name: pgadmin-svc
  namespace: postgres
spec:
  selector:
    app: pgclient
  type: NodePort
  ports:
  - port: 80
    targetPort: 80
    name: pgclient