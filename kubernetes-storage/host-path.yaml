apiVersion: v1
kind: Namespace
metadata:
  name: hostpath-data

---
apiVersion: v1
kind: Pod
metadata:
  name: myapp
  namespace: hostpath-data
  labels:
    app.kubernetes.io/name: myapp
spec:
  containers:
  - name: myapp
    image: ubuntu:latest
    resources:
      requests: 
        memory: "100Mi"
        cpu: "300m"
      limits:
        memory: "128Mi"
        cpu: "500m"
    ports:
      - containerPort: 80
    command:
      - sleep
      - "3600"
    volumeMounts:
    - name: data-vol
      mountPath: /mnt   
  volumes:
  - name: data-vol
    hostPath:
      path: /opt/hostpathdata
      type: Directory 
