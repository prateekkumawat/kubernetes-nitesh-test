apiVersion: v1
kind: Pod
metadata:
  name: myapp
  namespace: storage-app
  labels:
    app: myapp
spec:
  volumes:
  - name: temp-data
    persistentVolumeClaim: 
      claimName: store-data-mount
  containers:
  - name: myapp
    image: busybox:latest
    resources:
      requests:
        memory: "100Mi"
        cpu: "200m"
      limits:
        memory: "128Mi"
        cpu: "500m"
    command:
      - sleep
      - "3600"
    restartPolicy: Always
    volumeMounts:
    - name: temp-data
      mountPath: /opt  
