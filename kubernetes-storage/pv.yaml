apiVersion: v1
kind: PersistentVolume
metadata:
  name: store-data-vol
spec:
  capacity:
    storage: 1Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Recycle
  mountOptions:
    - hard
    - nfsvers=4.1
  nfs:
    path: /condtainerdata/
    server: 172.31.2.231

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: store-data-mount
  namespace: storage-app
spec:
  resources:
    requests:
      storage: 1Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
